 => (amount || 0) * (rates[currency] || 1);\n\n  const companySnap = useMemo(() => {\n    const aRows = companyAssets.filter(x => x.date === selectedDate);\n    const lRows = companyLiab.filter(x => x.date === selectedDate);\n    const totalA = aRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n    const totalL = lRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n    return { aRows, lRows, totalA, totalL, equity: totalA - totalL };\n  }, [companyAssets, companyLiab, selectedDate, rates]);\n\n  const personalSnap = useMemo(() => {\n    const aRows = personalAssets.filter(x => x.date === selectedDate);\n    const lRows = personalLiab.filter(x => x.date === selectedDate);\n    const rawTotalA = aRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n    const totalL = lRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n    const byCat = {};\n    ASSET_CATEGORIES.forEach(c => byCat[c] = 0);\n    aRows.forEach(x => { byCat[x.category] = (byCat[x.category] || 0) + twd(x.amount, x.currency); });\n    if (showCompanyValue && companySnap.equity > 0) {\n      byCat['\u5176\u4ed6'] = (byCat['\u5176\u4ed6'] || 0) + companySnap.equity;\n    }\n    const byHolder = {};\n    aRows.forEach(x => { byHolder[x.holder] = (byHolder[x.holder] || 0) + twd(x.amount, x.currency); });\n    if (showCompanyValue && companySnap.equity > 0) {\n      byHolder['\u516c\u53f8\u80a1\u6b0a'] = companySnap.equity;\n    }\n    const totalA = rawTotalA + (showCompanyValue ? Math.max(companySnap.equity, 0) : 0);\n    return { aRows, lRows, totalA, totalL, net: totalA - totalL, byCat, byHolder, rawTotalA };\n  }, [personalAssets, personalLiab, selectedDate, rates, showCompanyValue, companySnap]);\n\n  const pieData = useMemo(() => {\n    return Object.entries(personalSnap.byCat).filter(([, v]) => v > 0).map(([name, value]) => ({ name, value: Math.round(value) }));\n  }, [personalSnap]);\n\n  const trend = useMemo(() => {\n    return allDates.map(d => {\n      const pa = personalAssets.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const pl = personalLiab.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const ca = companyAssets.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const cl = companyLiab.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const companyEq = Math.max(ca - cl, 0);\n      const totalA = pa + (showCompanyValue ? companyEq : 0);\n      return {\n        date: d.slice(5),\n        \u500b\u4eba\u8cc7\u7522: Math.round(pa / 1e4),\n        \u500b\u4eba\u8ca0\u50b5: Math.round(pl / 1e4),\n        \u516c\u53f8\u6de8\u503c: Math.round(companyEq / 1e4),\n        \u6de8\u8cc7\u7522: Math.round((totalA - pl) / 1e4),\n      };\n    });\n  }, [personalAssets, personalLiab, companyAssets, companyLiab, allDates, rates, showCompanyValue]);\n\n  // ============ \u8ca1\u52d9\u9ad4\u6aa2\u8a08\u7b97\uff08hooks \u5fc5\u9808\u5728 early return \u524d\uff09============\n  const MONTHLY_EXPENSE_DEFAULT = 200000;\n\n  const health = useMemo(() => {\n    const totalA = personalSnap.totalA;\n    const totalL = personalSnap.totalL;\n    const rawTotalA = personalSnap.rawTotalA;\n    const byCat = personalSnap.byCat;\n    const aRows = personalSnap.aRows;\n\n    const debtRatio = totalA > 0 ? totalL / totalA : 1;\n    let debtScore;\n    if (debtRatio < 0.3) debtScore = 100 - debtRatio * 100 / 3;\n    else if (debtRatio < 0.5) debtScore = 90 - (debtRatio - 0.3) * 100;\n    else if (debtRatio < 0.8) debtScore = 70 - (debtRatio - 0.5) * 100;\n    else debtScore = Math.max(0, 40 - (debtRatio - 0.8) * 200);\n    debtScore = Math.max(0, Math.min(100, debtScore));\n\n    // \u6d41\u52d5\u6027\uff1a\u7528\u6bcf\u7b46\u7684 liquidity \u6a19\u8a18\u52a0\u6b0a\u8a08\u7b97\n    // instant=100%, week=90%, month=60%, long=0%\n    // \u6c92\u6a19\u8a18\u7684\u9000\u56de\u820a\u908f\u8f2f\uff1a\u73fe\u91d1\u5b58\u6b3e=100%, \u80a1\u7968/\u57fa\u91d1/\u50b5\u5238=70%\n    const liquidityWeight = (row) => {\n      if (row.liquidity) {\n        const lv = LIQUIDITY_LEVELS.find(l => l.key === row.liquidity);\n        return lv ? lv.weight : 0;\n      }\n      if (row.category === '\u73fe\u91d1\u5b58\u6b3e') return 1.0;\n      if (row.category === '\u80a1\u7968/\u57fa\u91d1' || row.category === '\u50b5\u5238') return 0.7;\n      return 0;\n    };\n    const liquid = aRows.reduce((s, x) => s + twd(x.amount, x.currency) * liquidityWeight(x), 0);\n\n    // \u77ed\u671f\u8ca0\u50b5\u8b66\u793a\uff1aurgency=high \u7684\u8ca0\u50b5\uff08\u5982\u6b20\u5b38\u5b38\uff09\u9700\u8981\u4fdd\u7559\u5c0d\u61c9\u6d41\u52d5\u73fe\u91d1\n    const urgentDebt = personalSnap.lRows\n      .filter(x => x.urgency === 'high')\n      .reduce((s, x) => s + twd(x.amount, x.currency), 0);\n\n    // \u5be6\u969b\u53ef\u7528\u6d41\u52d5 = \u6d41\u52d5\u8cc7\u7522 \u2212 \u7dca\u6025\u8ca0\u50b5\uff08\u8981\u7559\u73fe\u91d1\u61c9\u4ed8\u7684\u90e8\u5206\uff09\n    const netLiquid = Math.max(0, liquid - urgentDebt);\n    const monthsCover = netLiquid / MONTHLY_EXPENSE_DEFAULT;\n    let liquidScore;\n    if (monthsCover >= 12) liquidScore = 100;\n    else if (monthsCover >= 6) liquidScore = 85 + (monthsCover - 6) / 6 * 15;\n    else if (monthsCover >= 3) liquidScore = 65 + (monthsCover - 3) / 3 * 20;\n    else if (monthsCover >= 1) liquidScore = 40 + (monthsCover - 1) / 2 * 25;\n    else liquidScore = monthsCover * 40;\n    liquidScore = Math.max(0, Math.min(100, liquidScore));\n\n    const catPcts = Object.values(byCat).filter(v => v > 0).map(v => v / totalA);\n    const maxCat = catPcts.length ? Math.max(...catPcts) : 1;\n    let diversifyScore;\n    if (maxCat <= 0.4) diversifyScore = 100;\n    else if (maxCat <= 0.5) diversifyScore = 100 - (maxCat - 0.4) * 200;\n    else if (maxCat <= 0.6) diversifyScore = 80 - (maxCat - 0.5) * 200;\n    else if (maxCat <= 0.8) diversifyScore = 60 - (maxCat - 0.6) * 100;\n    else diversifyScore = Math.max(0, 40 - (maxCat - 0.8) * 100);\n\n    const holderTotals = {};\n    aRows.forEach(x => { holderTotals[x.holder] = (holderTotals[x.holder] || 0) + twd(x.amount, x.currency); });\n    const holderPcts = Object.values(holderTotals).filter(v => v > 0).map(v => v / (rawTotalA || 1));\n    const maxHolder = holderPcts.length ? Math.max(...holderPcts) : 1;\n    let holderScore;\n    if (maxHolder <= 0.6) holderScore = 100;\n    else if (maxHolder <= 0.75) holderScore = 100 - (maxHolder - 0.6) * 200;\n    else if (maxHolder <= 0.9) holderScore = 70 - (maxHolder - 0.75) * 200;\n    else holderScore = Math.max(0, 40 - (maxHolder - 0.9) * 200);\n\n    const curTotals = {};\n    aRows.forEach(x => { curTotals[x.currency] = (curTotals[x.currency] || 0) + twd(x.amount, x.currency); });\n    const curPcts = Object.values(curTotals).filter(v => v > 0).map(v => v / (rawTotalA || 1));\n    const maxCur = curPcts.length ? Math.max(...curPcts) : 1;\n    let curScore;\n    if (maxCur <= 0.5) curScore = 100;\n    else if (maxCur <= 0.7) curScore = 100 - (maxCur - 0.5) * 150;\n    else if (maxCur <= 0.85) curScore = 70 - (maxCur - 0.7) * 200;\n    else curScore = Math.max(0, 40 - (maxCur - 0.85) * 200);\n\n    // \u61c9\u6025\u8986\u84cb\uff1a\u6263\u6389\u7dca\u6025\u8ca0\u50b5\u5f8c\u7684\u6d41\u52d5\u8cc7\u7522\n    const monthsPlus = netLiquid / MONTHLY_EXPENSE_DEFAULT;\n    let emergencyScore;\n    if (monthsPlus >= 24) emergencyScore = 100;\n    else if (monthsPlus >= 12) emergencyScore = 80 + (monthsPlus - 12) / 12 * 20;\n    else if (monthsPlus >= 6) emergencyScore = 60 + (monthsPlus - 6) / 6 * 20;\n    else emergencyScore = monthsPlus / 6 * 60;\n    emergencyScore = Math.max(0, Math.min(100, emergencyScore));\n\n    const total = Math.round(\n      debtScore * 0.25 +\n      liquidScore * 0.25 +\n      diversifyScore * 0.2 +\n      holderScore * 0.1 +\n      curScore * 0.1 +\n      emergencyScore * 0.1\n    );\n\n    return {\n      total,\n      debtScore: Math.round(debtScore), debtRatio,\n      liquidScore: Math.round(liquidScore), liquid, netLiquid, urgentDebt, monthsCover,\n      diversifyScore: Math.round(diversifyScore), maxCat,\n      maxCatName: (Object.entries(byCat).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1])[0] || ['\u2014'])[0],\n      holderScore: Math.round(holderScore), maxHolder,\n      maxHolderName: (Object.entries(holderTotals).sort((a, b) => b[1] - a[1])[0] || ['\u2014'])[0],\n      curScore: Math.round(curScore), maxCur,\n      maxCurName: (Object.entries(curTotals).sort((a, b) => b[1] - a[1])[0] || ['\u2014'])[0],\n      emergencyScore: Math.round(emergencyScore), monthsPlus,\n    };\n  }, [personalSnap]);\n\n  const healthTrend = useMemo(() => {\n    return allDates.map(d => {\n      const aRows = personalAssets.filter(x => x.date === d);\n      const lRows = personalLiab.filter(x => x.date === d);\n      const cA = companyAssets.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const cL = companyLiab.filter(x => x.date === d).reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const companyEq = Math.max(cA - cL, 0);\n      const rawTotalA = aRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const totalA = rawTotalA + (showCompanyValue ? companyEq : 0);\n      const totalL = lRows.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const debtRatio = totalA > 0 ? totalL / totalA : 1;\n      let debtScore;\n      if (debtRatio < 0.3) debtScore = 100 - debtRatio * 100 / 3;\n      else if (debtRatio < 0.5) debtScore = 90 - (debtRatio - 0.3) * 100;\n      else if (debtRatio < 0.8) debtScore = 70 - (debtRatio - 0.5) * 100;\n      else debtScore = Math.max(0, 40 - (debtRatio - 0.8) * 200);\n      debtScore = Math.max(0, Math.min(100, debtScore));\n\n      const liquid = aRows.filter(x => x.category === '\u73fe\u91d1\u5b58\u6b3e').reduce((s, x) => s + twd(x.amount, x.currency), 0);\n      const monthsCover = liquid / MONTHLY_EXPENSE_DEFAULT;\n      let liquidScore;\n      if (monthsCover >= 6) liquidScore = 100;\n      else if (monthsCover >= 3) liquidScore = 70 + (monthsCover - 3) * 10;\n      else if (monthsCover >= 1) liquidScore = 40 + (monthsCover - 1) * 15;\n      else liquidScore = monthsCover * 40;\n      liquidScore = Math.max(0, Math.min(100, liquidScore));\n\n      const byCat = {};\n      aRows.forEach(x => { byCat[x.category] = (byCat[x.category] || 0) + twd(x.amount, x.currency); });\n      const vals = Object.values(byCat);\n      const maxCat = totalA > 0 && vals.length ? Math.max(...vals, 0) / totalA : 1;\n      let diversifyScore;\n      if (maxCat <= 0.4) diversifyScore = 100;\n      else if (maxCat <= 0.5) diversifyScore = 100 - (maxCat - 0.4) * 200;\n      else if (maxCat <= 0.6) diversifyScore = 80 - (maxCat - 0.5) * 200;\n      else if (maxCat <= 0.8) diversifyScore = 60 - (maxCat - 0.6) * 100;\n      else diversifyScore = Math.max(0, 40 - (maxCat - 0.8) * 100);\n\n      const total = Math.round(debtScore * 0.25 + liquidScore * 0.25 + diversifyScore * 0.2 + 70 * 0.3);\n      return { date: d.slice(5), \u8a55\u5206: total };\n    });\n  }, [personalAssets, personalLiab, companyAssets, companyLiab, allDates, rates, showCompanyValue]);\n\n  if (loading) {\n    return <div className=\"min-h-screen bg-zinc-950 flex items-center justify-center text-zinc-500\">\u8f09\u5165\u4e2d\u2026</div>;\n  }\n\n  const renderOverview = () => (\n    <div className=\"space-y-4\">\n      <div className=\"grid grid-cols-2 lg:grid-cols-4 gap-3\">\n        <KPI label=\"\u500b\u4eba\u7e3d\u8cc7\u7522\" value={personalSnap.totalA} color=\"text-emerald-400\" icon={<Wallet className=\"w-4 h-4\" />} />\n        <KPI label=\"\u500b\u4eba\u7e3d\u8ca0\u50b5\" value={personalSnap.totalL} color=\"text-rose-400\" icon={<AlertCircle className=\"w-4 h-4\" />} />\n        <KPI label=\"\u6de8\u8cc7\u7522\" value={personalSnap.net} color={personalSnap.net >= 0 ? \"text-emerald-400\" : \"text-rose-400\"} icon={<TrendingUp className=\"w-4 h-4\" />} highlight />\n        <KPI label=\"\u8ca0\u50b5\u6bd4\" value={personalSnap.totalA ? (personalSnap.totalL / personalSnap.totalA * 100) : 0} suffix=\"%\" decimal={1} color=\"text-zinc-200\" />\n      </div>\n\n      <div className=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">\n        <div className=\"flex items-center justify-between flex-wrap gap-3\">\n          <div>\n            <div className=\"text-xs text-zinc-500\">\u516c\u53f8\u7368\u7acb\u6de8\u503c (\u80a1\u6b0a\u50f9\u503c)</div>\n            <div className=\"text-xl font-bold tabular-nums text-amber-400 mt-1\">{fmtShort(companySnap.equity)} TWD</div>\n            <div className=\"text-xs text-zinc-500 mt-1\">\u8cc7\u7522 {fmtShort(companySnap.totalA)} \u2212 \u8ca0\u50b5 {fmtShort(companySnap.totalL)}</div>\n          </div>\n          <button\n            onClick={() => setShowCompanyValue(!showCompanyValue)}\n            className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition ${\n              showCompanyValue ? 'bg-amber-500/20 text-amber-300 border border-amber-500/40' : 'bg-zinc-800 text-zinc-400 border border-zinc-700'\n            }`}>\n            {showCompanyValue ? <ToggleRight className=\"w-5 h-5\" /> : <ToggleLeft className=\"w-5 h-5\" />}\n            {showCompanyValue ? '\u516c\u53f8\u6de8\u503c\u5df2\u4f75\u5165\u500b\u4eba' : '\u516c\u53f8\u6de8\u503c\u672a\u8a08\u5165'}\n          </button>\n        </div>\n      </div>\n\n      <div className=\"grid lg:grid-cols-2 gap-3\">\n        <Card title=\"\u8cc7\u7522\u914d\u7f6e\">\n          {pieData.length === 0 ? <Empty /> : (\n            <ResponsiveContainer width=\"100%\" height={280}>\n              <PieChart>\n                <Pie data={pieData} dataKey=\"value\" nameKey=\"name\" cx=\"50%\" cy=\"50%\" outerRadius={95}\n                  label={(e) => `${e.name} ${(e.percent * 100).toFixed(0)}%`}\n                  style={{ fontSize: 11, fill: '#d4d4d8' }}>\n                  {pieData.map((e, i) => <Cell key={i} fill={ASSET_COLORS[e.name] || '#71717a'} stroke=\"#09090b\" strokeWidth={2} />)}\n                </Pie>\n                <Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, color: '#fafafa' }} formatter={(v) => fmt(v)} />\n              </PieChart>\n            </ResponsiveContainer>\n          )}\n        </Card>\n\n        <Card title=\"\u6b77\u53f2\u8d70\u52e2 (\u842cTWD)\">\n          {trend.length <= 1 ? <Empty msg=\"\u7d2f\u7a4d\u591a\u7b46\u7d00\u9304\u5f8c\u51fa\u73fe\u8d70\u52e2\" /> : (\n            <ResponsiveContainer width=\"100%\" height={280}>\n              <LineChart data={trend}>\n                <CartesianGrid strokeDasharray=\"3 3\" stroke=\"#27272a\" />\n                <XAxis dataKey=\"date\" tick={{ fontSize: 11, fill: '#a1a1aa' }} />\n                <YAxis tick={{ fontSize: 11, fill: '#a1a1aa' }} />\n                <Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8 }} formatter={(v) => `${fmt(v)} \u842c`} />\n                <Legend wrapperStyle={{ fontSize: 12, color: '#d4d4d8' }} />\n                <Line type=\"monotone\" dataKey=\"\u6de8\u8cc7\u7522\" stroke=\"#60a5fa\" strokeWidth={3} />\n                <Line type=\"monotone\" dataKey=\"\u500b\u4eba\u8cc7\u7522\" stroke=\"#34d399\" strokeWidth={2} />\n                <Line type=\"monotone\" dataKey=\"\u500b\u4eba\u8ca0\u50b5\" stroke=\"#f87171\" strokeWidth={2} />\n                <Line type=\"monotone\" dataKey=\"\u516c\u53f8\u6de8\u503c\" stroke=\"#fbbf24\" strokeWidth={2} strokeDasharray=\"5 5\" />\n              </LineChart>\n            </ResponsiveContainer>\n          )}\n        </Card>\n      </div>\n\n      <div className=\"grid lg:grid-cols-2 gap-3\">\n        <Card title=\"\u4f9d\u5206\u985e\">\n          <table className=\"w-full text-sm\">\n            <thead className=\"text-zinc-500 text-xs\">\n              <tr><th className=\"text-left py-2\">\u5206\u985e</th><th className=\"text-right\">\u91d1\u984d (TWD)</th><th className=\"text-right w-14\">\u5360\u6bd4</th></tr>\n            </thead>\n            <tbody>\n              {Object.entries(personalSnap.byCat).filter(([, v]) => v !== 0).sort((a, b) => b[1] - a[1]).map(([k, v]) => (\n                <tr key={k} className=\"border-t border-zinc-800\">\n                  <td className=\"py-2 text-zinc-200 flex items-center gap-2\">\n                    <span className=\"w-2 h-2 rounded-full\" style={{ background: ASSET_COLORS[k] || '#71717a' }}></span>{k}\n                  </td>\n                  <td className=\"text-right tabular-nums text-zinc-200\">{fmt(v)}</td>\n                  <td className=\"text-right tabular-nums text-zinc-500\">{personalSnap.totalA ? (v / personalSnap.totalA * 100).toFixed(1) : 0}%</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </Card>\n\n        <Card title=\"\u4f9d\u6301\u6709\u4eba\">\n          <table className=\"w-full text-sm\">\n            <thead className=\"text-zinc-500 text-xs\">\n              <tr><th className=\"text-left py-2\">\u6301\u6709\u4eba</th><th className=\"text-right\">\u91d1\u984d (TWD)</th><th className=\"text-right w-14\">\u5360\u6bd4</th></tr>\n            </thead>\n            <tbody>\n              {Object.entries(personalSnap.byHolder).filter(([, v]) => v !== 0).sort((a, b) => b[1] - a[1]).map(([k, v]) => (\n                <tr key={k} className=\"border-t border-zinc-800\">\n                  <td className=\"py-2 text-zinc-200\">{k}</td>\n                  <td className=\"text-right tabular-nums text-zinc-200\">{fmt(v)}</td>\n                  <td className=\"text-right tabular-nums text-zinc-500\">{personalSnap.totalA ? (v / personalSnap.totalA * 100).toFixed(1) : 0}%</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </Card>\n      </div>\n    </div>\n  );\n\n  const renderList = (rows, isAsset, scope) => {\n    const filtered = rows.filter(x => x.date === selectedDate);\n    const total = filtered.reduce((s, x) => s + twd(x.amount, x.currency), 0);\n    const key = scope === 'personal' ? (isAsset ? 'personalAssets' : 'personalLiab') : (isAsset ? 'companyAssets' : 'companyLiab');\n    const setter = scope === 'personal' ? (isAsset ? setPersonalAssets : setPersonalLiab) : (isAsset ? setCompanyAssets : setCompanyLiab);\n    const data = scope === 'personal' ? (isAsset ? personalAssets : personalLiab) : (isAsset ? companyAssets : companyLiab);\n\n    return (\n      <div className=\"space-y-3\">\n        <div className=\"flex items-center justify-between gap-2 flex-wrap\">\n          <div className=\"text-sm text-zinc-400\">{selectedDate}\u3000\u5171 {filtered.length} \u7b46\u3000\u5408\u8a08 <span className=\"text-zinc-200 font-medium\">{fmt(total)} TWD</span></div>\n          <button\n            onClick={() => setSnapshotMode(scope)}\n            className=\"inline-flex items-center gap-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm\">\n            <Sparkles className=\"w-4 h-4\" /> \u65b0\u589e\u7d00\u9304\n          </button>\n        </div>\n\n        {filtered.length === 0 && (\n          <div className=\"bg-zinc-900 border border-zinc-800 rounded-xl py-10 text-center space-y-3\">\n            <div className=\"text-zinc-500 text-sm\">\u672c\u671f\uff08{selectedDate}\uff09\u5c1a\u7121\u8cc7\u6599</div>\n            <div className=\"flex flex-col items-center gap-2\">\n              <button\n                onClick={() => setSnapshotMode(scope)}\n                className=\"px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm inline-flex items-center gap-1\">\n                <Sparkles className=\"w-4 h-4\" /> \u65b0\u589e\u7d00\u9304\n              </button>\n              {/* \u5982\u679c\u662f storage \u6389\u8cc7\u6599\uff0c\u63d0\u4f9b\u4e00\u9375\u6062\u5fa9 */}\n              {data.length === 0 && (\n                <button\n                  onClick={async () => {\n                    const seed = scope === 'personal'\n                      ? (isAsset ? withIds(SEED_PERSONAL_ASSETS, 'pa') : withIds(SEED_PERSONAL_LIABILITIES, 'pl'))\n                      : (isAsset ? withIds(SEED_COMPANY_ASSETS, 'ca') : withIds(SEED_COMPANY_LIABILITIES, 'cl'));\n                    await save(key, setter, seed);\n                  }}\n                  className=\"px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-amber-300 rounded-lg text-sm\">\n                  \u26a0\ufe0f \u8cc7\u6599\u907a\u5931\u4e86\uff1f\u9ede\u6b64\u6062\u5fa9 2026-05-11 \u7a2e\u5b50\u8cc7\u6599\n                </button>\n              )}\n            </div>\n          </div>\n        )}\n\n        <div className=\"space-y-2.5\">\n          {filtered.map(x => {\n            const liqLevel = isAsset && x.liquidity ? LIQUIDITY_LEVELS.find(l => l.key === x.liquidity) : null;\n            const urgencyMap = {\n              high: { label: '\ud83d\udd34 \u96a8\u6642\u53ef\u80fd\u8981\u9084', color: 'text-rose-400' },\n              medium: { label: '\ud83d\udfe1 \u56fa\u5b9a\u9084\u6b3e\u4e2d', color: 'text-amber-400' },\n              low: { label: '\ud83d\udfe2 \u66ab\u4e0d\u7528\u9084/\u53ea\u9084\u606f', color: 'text-emerald-400' },\n            };\n            const urg = !isAsset && x.urgency ? urgencyMap[x.urgency] : null;\n\n            return (\n              <div key={x.id} className=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">\n                {/* \u7b2c\u4e00\u884c\uff1a\u540d\u7a31\uff08\u53ef\u9ede\u64ca\u7de8\u8f2f\uff09 + \u522a\u9664 */}\n                <div className=\"flex items-start justify-between gap-2\">\n                  <EditableName\n                    value={x.name}\n                    onSave={(newName) => {\n                      const updated = data.map(d => d.id === x.id ? { ...d, name: newName } : d);\n                      save(key, setter, updated);\n                    }}\n                  />\n                  <button onClick={() => save(key, setter, data.filter(d => d.id !== x.id))}\n                    className=\"p-1 text-zinc-700 hover:text-rose-400 flex-shrink-0\" title=\"\u522a\u9664\">\n                    <Trash2 className=\"w-4 h-4\" />\n                  </button>\n                </div>\n\n                {/* \u7b2c\u4e8c\u884c\uff1a\u6a19\u7c64 */}\n                <div className=\"flex items-center gap-2 mt-1.5 flex-wrap\">\n                  <span className=\"text-[10px] px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400\">{x.category}</span>\n                  <span className=\"text-[10px] text-zinc-500\">{isAsset ? x.holder : x.counterparty}</span>\n                  {liqLevel && <span className={`text-[10px] ${liqLevel.color}`}>\ud83d\udca7 {liqLevel.label}</span>}\n                  {urg && <span className={`text-[10px] ${urg.color}`}>{urg.label}</span>}\n                </div>\n\n                {/* \u7b2c\u4e09\u884c\uff1a\u91d1\u984d \u2014 \u9ede\u539f\u5e63\u91d1\u984d\u53ef\u76f4\u63a5\u7de8\u8f2f */}\n                <EditableAmount\n                  currency={x.currency}\n                  amount={x.amount}\n                  twdValue={twd(x.amount, x.currency)}\n                  onSave={(newAmount) => {\n                    const updated = data.map(d => d.id === x.id ? { ...d, amount: newAmount } : d);\n                    save(key, setter, updated);\n                  }}\n                />\n\n                {/* \u5099\u8a3b \u2014 \u9ede\u64ca\u53ef\u7de8\u8f2f */}\n                <EditableNote\n                  value={x.note || ''}\n                  onSave={(newNote) => {\n                    const updated = data.map(d => d.id === x.id ? { ...d, note: newNote } : d);\n                    save(key, setter, updated);\n                  }}\n                />\n              </div>\n            );\n          })}\n        </div>\n      </div>\n    );\n  };\n\n\n  const getGrade = (score) => {\n    if (score >= 90) return { letter: 'A+', color: 'text-emerald-400', bg: 'from-emerald-900/40 to-emerald-700/20', desc: '\u8ca1\u52d9\u72c0\u6cc1\u6975\u4f73' };\n    if (score >= 80) return { letter: 'A', color: 'text-emerald-400', bg: 'from-emerald-900/30 to-emerald-700/10', desc: '\u8ca1\u52d9\u72c0\u6cc1\u826f\u597d' };\n    if (score >= 70) return { letter: 'B+', color: 'text-blue-400', bg: 'from-blue-900/30 to-blue-700/10', desc: '\u57fa\u672c\u5065\u5eb7\uff0c\u6709\u6539\u5584\u7a7a\u9593' };\n    if (score >= 60) return { letter: 'B', color: 'text-blue-400', bg: 'from-blue-900/30 to-blue-700/10', desc: '\u53ef\u63a5\u53d7\uff0c\u4f46\u8981\u7559\u610f\u98a8\u96aa' };\n    if (score >= 50) return { letter: 'C', color: 'text-amber-400', bg: 'from-amber-900/30 to-amber-700/10', desc: '\u9700\u8981\u7a4d\u6975\u6539\u5584' };\n    return { letter: 'D', color: 'text-rose-400', bg: 'from-rose-900/40 to-rose-700/20', desc: '\u8ca1\u52d9\u72c0\u6cc1\u9700\u8981\u7acb\u523b\u8655\u7406' };\n  };\n\n  const renderHealth = () => {\n    const grade = getGrade(health.total);\n    const monthlyExp = MONTHLY_EXPENSE_DEFAULT;\n\n    const items = [\n      {\n        name: '\u8ca0\u50b5\u6bd4', icon: <Shield className=\"w-5 h-5\" />, weight: 25,\n        score: health.debtScore,\n        actual: `${(health.debtRatio * 100).toFixed(1)}%`,\n        ideal: '< 30%',\n        tip: health.debtRatio < 0.3 ? '\u2705 \u8ca0\u50b5\u63a7\u5236\u5f97\u5f88\u597d' : health.debtRatio < 0.5 ? '\ud83d\udc4d \u5065\u5eb7\u7bc4\u570d\uff0c\u4f46\u8981\u7559\u610f' : health.debtRatio < 0.8 ? '\u26a0\ufe0f \u8ca0\u50b5\u504f\u9ad8\uff0c\u5efa\u8b70\u512a\u5148\u9084\u6b3e' : '\ud83d\udd34 \u8ca0\u50b5\u904e\u9ad8\uff0c\u9700\u7a4d\u6975\u8655\u7406',\n      },\n      {\n        name: '\u6d41\u52d5\u6027', icon: <Droplet className=\"w-5 h-5\" />, weight: 25,\n        score: health.liquidScore,\n        actual: `\u6de8\u6d41\u52d5 ${health.monthsCover.toFixed(1)} \u500b\u6708`,\n        ideal: '\u2265 6 \u500b\u6708\u751f\u6d3b\u8cbb',\n        tip: health.urgentDebt > 0\n          ? `\u7e3d\u6d41\u52d5 ${fmtShort(health.liquid)}\uff0c\u6263\u6389\u7dca\u6025\u8ca0\u50b5 ${fmtShort(health.urgentDebt)} = \u6de8\u53ef\u52d5 ${fmtShort(health.netLiquid)}`\n          : (health.monthsCover >= 6 ? '\u2705 \u7dca\u6025\u9810\u5099\u91d1\u5145\u8db3' : health.monthsCover >= 3 ? '\u26a0\ufe0f \u9810\u5099\u91d1\u5c1a\u53ef\uff0c\u5efa\u8b70\u518d\u589e\u52a0' : '\ud83d\udd34 \u6d41\u52d5\u73fe\u91d1\u592a\u5c11'),\n      },\n      {\n        name: '\u8cc7\u7522\u5206\u6563\u5ea6', icon: <PieIcon className=\"w-5 h-5\" />, weight: 20,\n        score: health.diversifyScore,\n        actual: `\u6700\u5927\u985e\u5225 ${health.maxCatName} ${(health.maxCat * 100).toFixed(0)}%`,\n        ideal: '\u55ae\u4e00\u985e\u5225 < 40%',\n        tip: health.maxCat <= 0.4 ? '\u2705 \u5206\u6563\u5f97\u4e0d\u932f' : health.maxCat <= 0.6 ? '\ud83d\udc4d \u9084\u7b97\u5206\u6563' : '\u26a0\ufe0f \u96c6\u4e2d\u5ea6\u504f\u9ad8\uff0c\u5efa\u8b70\u591a\u5143\u914d\u7f6e',\n      },\n      {\n        name: '\u6301\u6709\u4eba\u5206\u6563', icon: <Users className=\"w-5 h-5\" />, weight: 10,\n        score: health.holderScore,\n        actual: `\u6700\u5927 ${health.maxHolderName} ${(health.maxHolder * 100).toFixed(0)}%`,\n        ideal: '\u55ae\u4e00\u6301\u6709\u4eba < 60%',\n        tip: health.maxHolder <= 0.6 ? '\u2705 \u592b\u59bb\u5206\u6563\u5408\u7406' : '\u26a0\ufe0f \u591a\u6578\u8cc7\u7522\u96c6\u4e2d\u55ae\u4eba\u540d\u4e0b',\n      },\n      {\n        name: '\u5e63\u5225\u5206\u6563', icon: <Globe className=\"w-5 h-5\" />, weight: 10,\n        score: health.curScore,\n        actual: `${health.maxCurName} ${(health.maxCur * 100).toFixed(0)}%`,\n        ideal: '\u55ae\u4e00\u5e63\u5225 < 50%',\n        tip: health.maxCur <= 0.5 ? '\u2705 \u8de8\u5e63\u5225\u914d\u7f6e\u826f\u597d' : health.maxCur <= 0.7 ? '\ud83d\udc4d \u9084\u7b97\u5206\u6563' : '\u26a0\ufe0f \u5e63\u5225\u96c6\u4e2d\uff0c\u532f\u7387\u6ce2\u52d5\u6703\u5f71\u97ff\u8eab\u5bb6',\n      },\n      {\n        name: '\u61c9\u6025\u8986\u84cb', icon: <Activity className=\"w-5 h-5\" />, weight: 10,\n        score: health.emergencyScore,\n        actual: `${health.monthsPlus.toFixed(0)} \u500b\u6708`,\n        ideal: '\u2265 24 \u500b\u6708\uff08\u542b\u53ef\u8b8a\u73fe\u6295\u8cc7\uff09',\n        tip: health.monthsPlus >= 24 ? '\u2705 \u6297\u98a8\u96aa\u80fd\u529b\u5f88\u5f37' : health.monthsPlus >= 12 ? '\ud83d\udc4d \u4e0d\u932f' : '\u26a0\ufe0f \u7dca\u6025\u9031\u8f49\u80fd\u529b\u504f\u5f31',\n      },\n    ];\n\n    return (\n      <div className=\"space-y-4\">\n        {/* \u7e3d\u5206\u5361 */}\n        <div className={`rounded-2xl p-6 bg-gradient-to-br ${grade.bg} border border-zinc-700`}>\n          <div className=\"flex items-center justify-between flex-wrap gap-4\">\n            <div>\n              <div className=\"text-xs text-zinc-400 mb-1\">\ud83d\udccb \u8ca1\u52d9\u9ad4\u6aa2\u7e3d\u5206 \u00b7 {selectedDate}</div>\n              <div className=\"flex items-baseline gap-3\">\n                <span className={`text-6xl font-bold ${grade.color}`}>{health.total}</span>\n                <span className=\"text-zinc-500 text-xl\">/ 100</span>\n                <span className={`text-3xl font-bold ${grade.color} ml-2`}>{grade.letter}</span>\n              </div>\n              <div className=\"text-zinc-300 text-sm mt-2\">{grade.desc}</div>\n            </div>\n            <div className=\"text-right\">\n              <div className=\"text-xs text-zinc-500 mb-1\">\u6708\u652f\u51fa\u4f30\u7b97</div>\n              <div className=\"text-zinc-200 tabular-nums\">{fmt(monthlyExp)} TWD</div>\n              <div className=\"text-[10px] text-zinc-600 mt-1\">\u542b\u6e2f\u5b58\u53f0\u8cb8\u5229\u606f+\u8eca\u8cb8+\u751f\u6d3b\u8cbb</div>\n            </div>\n          </div>\n        </div>\n\n        {/* \u8da8\u52e2 */}\n        {healthTrend.length > 1 && (\n          <Card title=\"\u9ad4\u6aa2\u5206\u6578\u6b77\u53f2\">\n            <ResponsiveContainer width=\"100%\" height={200}>\n              <LineChart data={healthTrend}>\n                <CartesianGrid strokeDasharray=\"3 3\" stroke=\"#27272a\" />\n                <XAxis dataKey=\"date\" tick={{ fontSize: 11, fill: '#a1a1aa' }} />\n                <YAxis domain={[0, 100]} tick={{ fontSize: 11, fill: '#a1a1aa' }} />\n                <Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8 }} />\n                <Line type=\"monotone\" dataKey=\"\u8a55\u5206\" stroke=\"#60a5fa\" strokeWidth={3} dot={{ fill: '#60a5fa', r: 4 }} />\n              </LineChart>\n            </ResponsiveContainer>\n          </Card>\n        )}\n\n        {/* \u5404\u9805\u7d30\u9805 */}\n        <div className=\"space-y-3\">\n          {items.map((item, i) => {\n            const itemGrade = getGrade(item.score);\n            return (\n              <div key={i} className=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">\n                <div className=\"flex items-center justify-between mb-3 gap-3\">\n                  <div className=\"flex items-center gap-2.5 flex-1 min-w-0\">\n                    <div className={`p-2 rounded-lg bg-zinc-800 ${itemGrade.color}`}>\n                      {item.icon}\n                    </div>\n                    <div className=\"min-w-0\">\n                      <div className=\"text-zinc-100 font-medium\">{item.name}</div>\n                      <div className=\"text-[11px] text-zinc-500\">\u6b0a\u91cd {item.weight}%</div>\n                    </div>\n                  </div>\n                  <div className=\"text-right flex-shrink-0\">\n                    <div className={`text-2xl font-bold ${itemGrade.color} tabular-nums`}>{item.score}</div>\n                    <div className=\"text-[10px] text-zinc-500\">/100</div>\n                  </div>\n                </div>\n\n                {/* \u5206\u6578\u689d */}\n                <div className=\"h-2 bg-zinc-800 rounded-full overflow-hidden mb-3\">\n                  <div\n                    className={`h-full rounded-full transition-all ${\n                      item.score >= 80 ? 'bg-emerald-500' :\n                      item.score >= 60 ? 'bg-blue-500' :\n                      item.score >= 40 ? 'bg-amber-500' : 'bg-rose-500'\n                    }`}\n                    style={{ width: `${item.score}%` }}\n                  />\n                </div>\n\n                <div className=\"grid grid-cols-2 gap-3 text-xs mb-2\">\n                  <div>\n                    <div className=\"text-zinc-500\">\u76ee\u524d</div>\n                    <div className=\"text-zinc-200 font-medium\">{item.actual}</div>\n                  </div>\n                  <div>\n                    <div className=\"text-zinc-500\">\u7406\u60f3</div>\n                    <div className=\"text-zinc-400\">{item.ideal}</div>\n                  </div>\n                </div>\n\n                <div className=\"text-xs text-zinc-300 bg-zinc-800/50 rounded-lg px-3 py-2 mt-2\">\n                  {item.tip}\n                </div>\n              </div>\n            );\n          })}\n        </div>\n\n        {/* \u884c\u52d5\u5efa\u8b70 */}\n        <div className=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">\n          <div className=\"text-zinc-100 font-semibold mb-3 flex items-center gap-2\">\n            \ud83d\udca1 \u6539\u5584\u5efa\u8b70\n          </div>\n          <div className=\"space-y-2 text-sm text-zinc-300\">\n            {items.filter(it => it.score < 70).slice(0, 3).map((it, i) => (\n              <div key={i} className=\"flex gap-2\">\n                <span className=\"text-amber-400 flex-shrink-0\">\u25b8</span>\n                <span><b className=\"text-zinc-100\">{it.name}</b> \u5206\u6578\u8f03\u4f4e\uff08{it.score}\uff09\uff0c{it.tip.replace(/^[\u2705\u26a0\ufe0f\ud83d\udd34\ud83d\udc4d]+\\s*/, '')}</span>\n              </div>\n            ))}\n            {items.filter(it => it.score < 70).length === 0 && (\n              <div className=\"text-emerald-300\">\ud83c\udf89 \u5404\u9805\u6307\u6a19\u90fd\u4e0d\u932f\uff0c\u7e7c\u7e8c\u4fdd\u6301\uff01</div>\n            )}\n          </div>\n        </div>\n\n        <p className=\"text-[10px] text-zinc-600 text-center mt-2 px-4\">\n          \u26a0\ufe0f \u8a55\u5206\u50c5\u4f9b\u53c3\u8003\uff0c\u6708\u652f\u51fa\u4f30\u7b97\u70ba 20 \u842c TWD\uff08\u5982\u9700\u8abf\u6574\u8acb\u544a\u8a34 Claude\uff09\u3002\u91cd\u5927\u8ca1\u52d9\u6c7a\u7b56\u8acb\u8aee\u8a62\u5c08\u696d\u9867\u554f\u3002\n        </p>\n      </div>\n    );\n  };\n\n  const renderSettings = () => (\n    <div className=\"grid md:grid-cols-2 gap-4 max-w-3xl\">\n      <Card title=\"\u532f\u7387\uff08\u5c0d\u53f0\u5e63 TWD\uff09\">\n        <div className=\"space-y-2\">\n          {CURRENCIES.map(c => (\n            <div key={c} className=\"flex items-center gap-3\">\n              <span className=\"w-12 text-zinc-300 font-medium\">{c}</span>\n              <input\n                type=\"number\" step=\"0.01\"\n                value={rates[c] != null ? rates[c] : ''}\n                onChange={e => setRates({ ...rates, [c]: parseFloat(e.target.value) || 0 })}\n                onBlur={() => save('rates', setRates, rates)}\n                className=\"flex-1 px-3 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-right tabular-nums text-zinc-100\"\n              />\n            </div>\n          ))}\n        </div>\n        <p className=\"text-xs text-zinc-500 mt-3\">\u532f\u7387\u6539\u5b8c\u6240\u6709\u9801\u9762\u81ea\u52d5\u91cd\u7b97</p>\n        <button\n          onClick={updateRates}\n          disabled={rateStatus === 'loading'}\n          className=\"w-full mt-3 px-3 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-zinc-700 text-white rounded-lg text-sm font-medium\">\n          {rateStatus === 'loading' ? '\u66f4\u65b0\u4e2d\u2026' :\n           rateStatus === 'ok' ? '\u2713 \u5df2\u66f4\u65b0\u4eca\u65e5\u532f\u7387' :\n           rateStatus === 'fail' ? '\u26a0\ufe0f \u66f4\u65b0\u5931\u6557\uff0c\u8acb\u624b\u52d5\u586b' :\n           '\ud83d\udd04 \u4e00\u9375\u66f4\u65b0\u4eca\u65e5\u532f\u7387'}\n        </button>\n        <p className=\"text-[11px] text-zinc-600 mt-2 leading-relaxed\">\n          \u9ede\u6b64\u6703\u9023\u5230\u516c\u958b\u532f\u7387\u670d\u52d9\u6293\u4eca\u65e5\u532f\u7387\uff08\u53ea\u6293\u532f\u7387\uff0c\u4e0d\u6703\u50b3\u51fa\u4f60\u7684\u4efb\u4f55\u8cc7\u6599\uff09\u3002\u5e73\u5e38\u4e0d\u9ede\u5247\u5b8c\u5168\u4e0d\u5c0d\u5916\u9023\u7dda\u3002\n        </p>\n      </Card>\n\n      <Card title=\"\u8cc7\u6599\u5099\u4efd\">\n        <BackupRestorePanel\n          getData={() => ({ personalAssets, personalLiab, companyAssets, companyLiab, rates })}\n          onRestore={async (d) => {\n            if (d.personalAssets) await save('personalAssets', setPersonalAssets, d.personalAssets);\n            if (d.personalLiab) await save('personalLiab', setPersonalLiab, d.personalLiab);\n            if (d.companyAssets) await save('companyAssets', setCompanyAssets, d.companyAssets);\n            if (d.companyLiab) await save('companyLiab', setCompanyLiab, d.companyLiab);\n            if (d.rates) await save('rates', setRates, d.rates);\n          }}\n        />\n      </Card>\n    </div>\n  );\n\n  return (\n    <div className=\"min-h-screen bg-zinc-950 text-zinc-100\">\n      <div className=\"bg-zinc-950 border-b border-zinc-800 sticky top-0 z-30\">\n        <div className=\"max-w-7xl mx-auto px-4 py-3\">\n          <div className=\"flex items-center justify-between flex-wrap gap-3\">\n            <h1 className=\"text-xl font-bold text-zinc-100 flex items-center gap-2\">\n              <Wallet className=\"w-5 h-5 text-blue-400\" /> \u8cc7\u7522\u5100\u8868\u677f\n            </h1>\n            <div className=\"flex items-center gap-2\">\n              <label className=\"text-xs text-zinc-500\">\u7d00\u9304\u65e5\u671f</label>\n              <select\n                value={selectedDate}\n                onChange={e => setSelectedDate(e.target.value)}\n                className=\"px-3 py-1.5 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100\">\n                {allDates.slice().reverse().map(d => <option key={d} value={d}>{d}</option>)}\n              </select>\n            </div>\n          </div>\n\n          <div className=\"flex gap-1 mt-3 -mb-px overflow-x-auto\">\n            {[\n              ['overview', '\u7e3d\u89bd', User],\n              ['health', '\u9ad4\u6aa2', Stethoscope],\n              ['p-assets', '\u500b\u4eba\u8cc7\u7522', Wallet],\n              ['p-liab', '\u500b\u4eba\u8ca0\u50b5', AlertCircle],\n              ['c-assets', '\u516c\u53f8\u8cc7\u7522', Building2],\n              ['c-liab', '\u516c\u53f8\u8ca0\u50b5', AlertCircle],\n              ['settings', '\u8a2d\u5b9a', SettingsIcon],\n            ].map(([k, label, Icon]) => (\n              <button\n                key={k}\n                onClick={() => setTab(k)}\n                className={`px-3 py-2 text-sm font-medium border-b-2 whitespace-nowrap transition flex items-center gap-1.5 ${\n                  tab === k ? 'border-blue-500 text-blue-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'\n                }`}>\n                <Icon className=\"w-4 h-4\" />{label}\n              </button>\n            ))}\n          </div>\n        </div>\n      </div>\n\n      <div className=\"max-w-7xl mx-auto px-4 py-5\">\n        {tab === 'overview' && renderOverview()}\n        {tab === 'health' && renderHealth()}\n        {tab === 'p-assets' && renderList(personalAssets, true, 'personal')}\n        {tab === 'p-liab' && renderList(personalLiab, false, 'personal')}\n        {tab === 'c-assets' && renderList(companyAssets, true, 'company')}\n        {tab === 'c-liab' && renderList(companyLiab, false, 'company')}\n        {tab === 'settings' && renderSettings()}\n      </div>\n\n      {/* \u5132\u5b58\u72c0\u614b\u6d6e\u52d5\u63d0\u793a */}\n      {saveStatus && (\n        <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 z-[60] px-4 py-2 rounded-2xl text-sm font-medium shadow-lg ${\n          saveStatus === 'saving' ? 'bg-zinc-800 text-zinc-300' :\n          saveStatus === 'ok' ? 'bg-emerald-600 text-white' :\n          'bg-rose-600 text-white'\n        }`}>\n          {saveStatus === 'saving' && '\u5132\u5b58\u4e2d\u2026'}\n          {saveStatus === 'ok' && '\u2713 \u5df2\u5132\u5b58'}\n          {saveStatus === 'fail' && (\n            <div className=\"flex items-center gap-3\">\n              <span>\u26a0\ufe0f \u5132\u5b58\u5931\u6557</span>\n              <button\n                onClick={saveAll}\n                className=\"px-3 py-1 bg-white text-rose-600 rounded-full text-xs font-bold\">\n                \u91cd\u65b0\u5132\u5b58\u5168\u90e8\n              </button>\n            </div>\n          )}\n        </div>\n      )}\n\n      {snapshotMode && (\n        <SnapshotModal\n          scope={snapshotMode}\n          existingAssets={snapshotMode === 'personal' ? personalAssets : companyAssets}\n          existingLiab={snapshotMode === 'personal' ? personalLiab : companyLiab}\n          assetTemplate={snapshotMode === 'personal' ? TEMPLATE_PERSONAL_ASSETS : TEMPLATE_COMPANY_ASSETS}\n          liabTemplate={snapshotMode === 'personal' ? TEMPLATE_PERSONAL_LIABILITIES : TEMPLATE_COMPANY_LIABILITIES}\n          onClose={() => setSnapshotMode(null)}\n          onSave={async (date, newAssets, newLiab) => {\n            // \u65b0\u9805\u76ee\u5957\u4e0a\u65e5\u671f + \u65b0 ID\n            const stamp = Date.now();\n            const assetItems = newAssets.map((x, i) => ({ ...x, id: 'a' + stamp + '_' + i, date }));\n            const liabItems = newLiab.map((x, i) => ({ ...x, id: 'l' + stamp + '_' + i, date }));\n\n            try {\n              if (snapshotMode === 'personal') {\n                // \u540c\u65e5\u8cc7\u6599\u5148\u79fb\u9664\uff0c\u518d\u52a0\u5165\u65b0\u7684\uff08= \u8986\u84cb\u7576\u65e5\u7d00\u9304\uff09\n                const cleanedAssets = personalAssets.filter(x => x.date !== date);\n                const cleanedLiab = personalLiab.filter(x => x.date !== date);\n                await save('personalAssets', setPersonalAssets, [...cleanedAssets, ...assetItems]);\n                await save('personalLiab', setPersonalLiab, [...cleanedLiab, ...liabItems]);\n              } else {\n                const cleanedAssets = companyAssets.filter(x => x.date !== date);\n                const cleanedLiab = companyLiab.filter(x => x.date !== date);\n                await save('companyAssets', setCompanyAssets, [...cleanedAssets, ...assetItems]);\n                await save('companyLiab', setCompanyLiab, [...cleanedLiab, ...liabItems]);\n              }\n              setSelectedDate(date);\n              setSnapshotMode(null);\n            } catch (err) {\n              console.error('\u5132\u5b58\u5931\u6557', err);\n            }\n          }}\n        />\n      )}\n    </div>\n  );\n}\n\nfunction KPI({ label, value, color = \"text-zinc-100\", suffix = \"\", decimal = 0, icon, highlight }) {\n  return (\n    <div className={`rounded-xl p-3 border ${highlight ? 'bg-gradient-to-br from-blue-950/60 to-indigo-950/40 border-blue-800/60' : 'bg-zinc-900 border-zinc-800'}`}>\n      <div className=\"flex items-center justify-between text-zinc-500 text-xs mb-1\">\n        <span>{label}</span>{icon}\n      </div>\n      <div className={`text-xl font-bold tabular-nums ${color}`}>\n        {suffix ? `${value.toFixed(decimal)}${suffix}` : fmtShort(value)}\n      </div>\n      {!suffix && <div className=\"text-xs text-zinc-600 tabular-nums mt-0.5\">{fmt(value)}</div>}\n    </div>\n  );\n}\n\nfunction Card({ title, children }) {\n  return (\n    <div className=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">\n      <h3 className=\"font-semibold text-zinc-300 mb-3 text-sm\">{title}</h3>\n      {children}\n    </div>\n  );\n}\n\nfunction Empty({ msg = '\u5c1a\u7121\u8cc7\u6599' }) {\n  return <div className=\"h-[260px] flex items-center justify-center text-zinc-600 text-sm\">{msg}</div>;\n}\n\nfunction EditableName({ value, onSave }) {\n  const [editing, setEditing] = useState(false);\n  const [text, setText] = useState(value);\n\n  useEffect(() => { setText(value); }, [value]);\n\n  if (!editing) {\n    return (\n      <button\n        onClick={() => setEditing(true)}\n        className=\"flex-1 min-w-0 text-left text-zinc-100 font-medium leading-tight hover:text-blue-300 transition group\">\n        {value} <span className=\"text-zinc-700 text-xs group-hover:text-zinc-500\">\u270f\ufe0f</span>\n      </button>\n    );\n  }\n\n  return (\n    <div className=\"flex-1 min-w-0 flex items-center gap-1.5\">\n      <input\n        autoFocus\n        type=\"text\"\n        value={text}\n        onChange={e => setText(e.target.value)}\n        onKeyDown={e => {\n          if (e.key === 'Enter' && text.trim()) { onSave(text.trim()); setEditing(false); }\n          if (e.key === 'Escape') { setText(value); setEditing(false); }\n        }}\n        className=\"flex-1 min-w-0 px-2 py-1 bg-zinc-800 border border-blue-500 rounded text-zinc-100 font-medium focus:outline-none\"\n      />\n      <button\n        onClick={() => { setText(value); setEditing(false); }}\n        className=\"p-1 text-zinc-500 hover:text-zinc-300 flex-shrink-0\">\n        <X className=\"w-4 h-4\" />\n      </button>\n      <button\n        onClick={() => { if (text.trim()) { onSave(text.trim()); setEditing(false); } }}\n        className=\"p-1 text-blue-400 hover:text-blue-300 flex-shrink-0\">\n        <Check className=\"w-4 h-4\" />\n      </button>\n    </div>\n  );\n}\n\nfunction EditableAmount({ currency, amount, twdValue, onSave }) {\n  const [editing, setEditing] = useState(false);\n  const [text, setText] = useState(String(amount || 0));\n\n  useEffect(() => { setText(String(amount || 0)); }, [amount]);\n\n  const fmtLocal = (n) => new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 }).format(Math.round(n));\n\n  if (!editing) {\n    return (\n      <button\n        onClick={() => setEditing(true)}\n        className=\"w-full flex items-baseline justify-between mt-2.5 pt-2.5 border-t border-zinc-800 hover:bg-zinc-800/40 rounded-b-lg transition px-1 -mx-1 text-left\">\n        <div className=\"text-xs text-zinc-500\">\n          {currency} {fmtLocal(amount)} <span className=\"text-zinc-700 ml-1\">\u270f\ufe0f</span>\n        </div>\n        <div className=\"text-lg font-semibold tabular-nums text-zinc-100\">\n          {fmtLocal(twdValue)} <span className=\"text-xs text-zinc-500 font-normal\">TWD</span>\n        </div>\n      </button>\n    );\n  }\n\n  return (\n    <div className=\"mt-2.5 pt-2.5 border-t border-zinc-800 space-y-1.5\">\n      <div className=\"flex items-center gap-2\">\n        <span className=\"text-xs text-zinc-500 w-12\">{currency}</span>\n        <input\n          autoFocus\n          type=\"number\"\n          inputMode=\"decimal\"\n          value={text}\n          onChange={e => setText(e.target.value)}\n          className=\"flex-1 px-3 py-2 bg-zinc-800 border border-blue-500 rounded-lg text-zinc-100 text-right tabular-nums text-lg focus:outline-none\"\n        />\n      </div>\n      <div className=\"flex gap-2 justify-end\">\n        <button\n          onClick={() => { setText(String(amount || 0)); setEditing(false); }}\n          className=\"px-3 py-1 text-xs text-zinc-400 hover:bg-zinc-800 rounded\">\n          \u53d6\u6d88\n        </button>\n        <button\n          onClick={() => { onSave(parseFloat(text) || 0); setEditing(false); }}\n          className=\"px-3 py-1 text-xs bg-blue-600 hover:bg-blue-500 text-white rounded font-medium\">\n          \u5132\u5b58\n        </button>\n      </div>\n    </div>\n  );\n}\n\nfunction EditableNote({ value, onSave }) {\n  const [editing, setEditing] = useState(false);\n  const [text, setText] = useState(value);\n\n  useEffect(() => { setText(value); }, [value]);\n\n  if (!editing) {\n    return (\n      <button\n        onClick={() => setEditing(true)}\n        className=\"w-full mt-2 text-left text-xs leading-relaxed bg-zinc-800/40 hover:bg-zinc-800/70 rounded-lg px-3 py-2 transition group\">\n        {value ? (\n          <span className=\"text-zinc-400\">\ud83d\udcdd {value}</span>\n        ) : (\n          <span className=\"text-zinc-600 group-hover:text-zinc-500\">\ud83d\udcdd \u9ede\u6b64\u52a0\u5099\u8a3b\u2026</span>\n        )}\n      </button>\n    );\n  }\n\n  return (\n    <div className=\"mt-2 space-y-1.5\">\n      <textarea\n        autoFocus\n        value={text}\n        onChange={e => setText(e.target.value)}\n        placeholder=\"\u4f8b\uff1a\u6708\u9084\u5229\u606f X \u842c\u3001\u5e74\u5229\u7387 X%\u3001\u5230\u671f\u65e5\u2026\"\n        rows={Math.max(2, Math.ceil(text.length / 30))}\n        className=\"w-full px-3 py-2 bg-zinc-800 border border-blue-500 rounded-lg text-zinc-100 text-xs leading-relaxed focus:outline-none resize-none\"\n      />\n      <div className=\"flex gap-2 justify-end\">\n        <button\n          onClick={() => { setText(value); setEditing(false); }}\n          className=\"px-3 py-1 text-xs text-zinc-400 hover:bg-zinc-800 rounded\">\n          \u53d6\u6d88\n        </button>\n        <button\n          onClick={() => { onSave(text); setEditing(false); }}\n          className=\"px-3 py-1 text-xs bg-blue-600 hover:bg-blue-500 text-white rounded font-medium\">\n          \u5132\u5b58\n        </button>\n      </div>\n    </div>\n  );\n}\n\nfunction BackupRestorePanel({ getData, onRestore }) {\n  const [mode, setMode] = useState(null); // null | 'backup' | 'restore'\n  const [text, setText] = useState('');\n  const [msg, setMsg] = useState('');\n  const [copied, setCopied] = useState(false);\n\n  const openBackup = () => {\n    const data = getData();\n    setText(JSON.stringify(data, null, 2));\n    setMode('backup');\n    setMsg('');\n    setCopied(false);\n  };\n\n  const openRestore = () => {\n    setText('');\n    setMode('restore');\n    setMsg('');\n  };\n\n  const copyToClipboard = async () => {\n    try {\n      // \u512a\u5148\u7528\u73fe\u4ee3 API\n      if (navigator.clipboard && navigator.clipboard.writeText) {\n        await navigator.clipboard.writeText(text);\n        setCopied(true);\n        setMsg('\u2713 \u5df2\u8907\u88fd\u5230\u526a\u8cbc\u7c3f\uff0c\u73fe\u5728\u8cbc\u5230\u5099\u5fd8\u9304\uff0fLINE \u7d66\u81ea\u5df1\u4fdd\u5b58');\n        setTimeout(() => setCopied(false), 3000);\n        return;\n      }\n    } catch (e) { /* fall through */ }\n    // \u9000\u800c\u6c42\u5176\u6b21\uff1a\u7528 select + execCommand\n    try {\n      const ta = document.getElementById('backup-textarea');\n      ta.select();\n      ta.setSelectionRange(0, 99999);\n      document.execCommand('copy');\n      setCopied(true);\n      setMsg('\u2713 \u5df2\u8907\u88fd\uff0c\u8cbc\u5230\u5099\u5fd8\u9304\u4fdd\u5b58');\n      setTimeout(() => setCopied(false), 3000);\n    } catch (e) {\n      setMsg('\u26a0\ufe0f \u7121\u6cd5\u81ea\u52d5\u8907\u88fd\uff0c\u8acb\u624b\u52d5\u9577\u6309\u6587\u5b57 \u2192 \u5168\u9078 \u2192 \u8907\u88fd');\n    }\n  };\n\n  const handleRestore = async () => {\n    try {\n      const d = JSON.parse(text.trim());\n      await onRestore(d);\n      setMsg('\u2713 \u9084\u539f\u5b8c\u6210');\n      setTimeout(() => { setMode(null); setMsg(''); }, 1500);\n    } catch (e) {\n      setMsg('\u26a0\ufe0f \u6587\u5b57\u683c\u5f0f\u932f\u8aa4\uff0c\u8acb\u78ba\u8a8d\u8cbc\u4e0a\u7684\u662f\u5b8c\u6574 JSON');\n    }\n  };\n\n  if (!mode) {\n    return (\n      <div className=\"space-y-2\">\n        <button onClick={openBackup}\n          className=\"w-full px-3 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm inline-flex items-center justify-center gap-2 font-medium\">\n          \ud83d\udccb \u7522\u751f\u5099\u4efd\u6587\u5b57\uff08\u8907\u88fd\u4fdd\u5b58\uff09\n        </button>\n        <button onClick={openRestore}\n          className=\"w-full px-3 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded-lg text-sm inline-flex items-center justify-center gap-2\">\n          \ud83d\udce5 \u5f9e\u5099\u4efd\u9084\u539f\uff08\u8cbc\u4e0a\u6587\u5b57\uff09\n        </button>\n        <p className=\"text-[11px] text-zinc-500 leading-relaxed mt-2\">\n          \u8cc7\u6599\u5e73\u5e38\u6703\u81ea\u52d5\u5132\u5b58\u3002\u5efa\u8b70\u5b9a\u671f\u8907\u88fd\u4e00\u4efd\u5099\u4efd\u6587\u5b57\u8cbc\u5230\u5099\u5fd8\u9304\u6216\u5bc4\u7d66\u81ea\u5df1 Email\uff0c\u4ee5\u9632\u8cc7\u6599\u907a\u5931\u3002\n        </p>\n      </div>\n    );\n  }\n\n  return (\n    <div className=\"space-y-2\">\n      <div className=\"flex items-center justify-between\">\n        <div className=\"text-sm text-zinc-300 font-medium\">\n          {mode === 'backup' ? '\ud83d\udc47 \u5168\u9078\u8907\u88fd\u9019\u6bb5\u6587\u5b57\u4fdd\u5b58' : '\ud83d\udc47 \u8cbc\u4e0a\u5099\u4efd\u6587\u5b57'}\n        </div>\n        <button onClick={() => { setMode(null); setMsg(''); }}\n          className=\"text-zinc-500 hover:text-zinc-300 text-xs\">\n          \u2190 \u8fd4\u56de\n        </button>\n      </div>\n\n      <textarea\n        id=\"backup-textarea\"\n        value={text}\n        onChange={e => setText(e.target.value)}\n        readOnly={mode === 'backup'}\n        placeholder={mode === 'restore' ? '\u8cbc\u4e0a\u4e4b\u524d\u8907\u88fd\u7684\u5099\u4efd\u6587\u5b57...' : ''}\n        className=\"w-full h-48 px-3 py-2 bg-zinc-950 border border-zinc-700 rounded-lg text-zinc-200 text-xs font-mono\"\n        onClick={mode === 'backup' ? (e) => e.target.select() : undefined}\n      />\n\n      {msg && (\n        <div className={`text-sm py-2 px-3 rounded-lg ${\n          msg.startsWith('\u2713') ? 'bg-emerald-500/15 text-emerald-300' : 'bg-amber-500/15 text-amber-300'\n        }`}>\n          {msg}\n        </div>\n      )}\n\n      {mode === 'backup' && (\n        <button onClick={copyToClipboard}\n          className={`w-full px-3 py-2.5 rounded-lg text-sm font-medium ${\n            copied ? 'bg-emerald-600 text-white' : 'bg-blue-600 hover:bg-blue-500 text-white'\n          }`}>\n          {copied ? '\u2713 \u5df2\u8907\u88fd' : '\ud83d\udccb \u9ede\u6b64\u8907\u88fd\u5168\u90e8'}\n        </button>\n      )}\n\n      {mode === 'restore' && (\n        <button onClick={handleRestore}\n          disabled={!text.trim()}\n          className=\"w-full px-3 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-white rounded-lg text-sm font-medium\">\n          \u78ba\u8a8d\u9084\u539f\n        </button>\n      )}\n    </div>\n  );\n}\n\nfunction SnapshotModal({ scope, existingAssets, existingLiab, assetTemplate, liabTemplate, onClose, onSave }) {\n  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));\n  const [section, setSection] = useState('asset'); // 'asset' or 'liab'\n  const [warning, setWarning] = useState('');\n  const [confirmOverwrite, setConfirmOverwrite] = useState(false);\n\n  const allDates = [...new Set([...existingAssets.map(x => x.date), ...existingLiab.map(x => x.date)])].filter(Boolean).sort();\n  const lastDate = allDates[allDates.length - 1];\n\n  const prevAssets = existingAssets.filter(x => x.date === lastDate);\n  const prevLiab = existingLiab.filter(x => x.date === lastDate);\n\n  const makeBlank = (isAsset) => ({\n    name: '', category: isAsset ? ASSET_CATEGORIES[0] : LIAB_CATEGORIES[0],\n    [isAsset ? 'holder' : 'counterparty']: scope === 'company' ? '\u516c\u53f8' : '\u4f60',\n    currency: 'HKD', amount: 0, note: '', isCustom: true,\n  });\n\n  const buildInitialRows = (template, prev, isAsset) => {\n    const ownerKey = isAsset ? 'holder' : 'counterparty';\n    const tagKey = isAsset ? 'liquidity' : 'urgency';\n    const templateNames = new Set(template.map(t => t.name));\n\n    const rowsFromTemplate = template.map(t => {\n      const found = prev.find(p => p.name === t.name);\n      return {\n        name: t.name,\n        category: t.category,\n        [ownerKey]: t[ownerKey],\n        currency: t.currency,\n        amount: found ? found.amount : 0,\n        note: (found && found.note) || t.note || '',\n        [tagKey]: (found && found[tagKey]) || t[tagKey] || (isAsset ? 'instant' : 'low'),\n        isCustom: false,\n      };\n    });\n\n    const rowsFromExtra = prev\n      .filter(p => !templateNames.has(p.name))\n      .map(p => ({\n        name: p.name,\n        category: p.category,\n        [ownerKey]: p[ownerKey],\n        currency: p.currency,\n        amount: p.amount,\n        note: p.note || '',\n        [tagKey]: p[tagKey] || (isAsset ? 'instant' : 'low'),\n        isCustom: true,\n      }));\n\n    return [...rowsFromTemplate, ...rowsFromExtra];\n  };\n\n  const [assetRows, setAssetRows] = useState(buildInitialRows(assetTemplate, prevAssets, true));\n  const [liabRows, setLiabRows] = useState(buildInitialRows(liabTemplate, prevLiab, false));\n\n  const updateAsset = (i, field, val) => {\n    const next = [...assetRows]; next[i] = { ...next[i], [field]: val }; setAssetRows(next);\n  };\n  const updateLiab = (i, field, val) => {\n    const next = [...liabRows]; next[i] = { ...next[i], [field]: val }; setLiabRows(next);\n  };\n\n  const holdersList = scope === 'company' ? HOLDERS_COMPANY : HOLDERS_PERSONAL;\n\n  // \u8a08\u7b97\u5408\u8a08\uff08TWD \u7b49\u503c\u7528\u7c21\u55ae\u4f30\u7b97\uff0c\u7d66\u4f7f\u7528\u8005\u53c3\u8003\uff09\n  const sumRows = (rows) => rows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);\n\n  // \u5361\u7247\u5143\u4ef6 \u2014 \u4e00\u500b\u8cc7\u7522/\u8ca0\u50b5\u4f54\u4e00\u5f35\u5361\u7247\n  const renderCard = (row, i, isAsset) => {\n    const update = isAsset ? updateAsset : updateLiab;\n    const setRows = isAsset ? setAssetRows : setLiabRows;\n    const rows = isAsset ? assetRows : liabRows;\n    const ownerKey = isAsset ? 'holder' : 'counterparty';\n    const ownerLabel = isAsset ? '\u6301\u6709\u4eba' : '\u5c0d\u8c61';\n    const cats = isAsset ? ASSET_CATEGORIES : LIAB_CATEGORIES;\n    const hasValue = parseFloat(row.amount) > 0;\n\n    return (\n      <div key={i} className={`rounded-2xl border p-4 transition ${\n        hasValue ? 'bg-zinc-900/80 border-zinc-700' : 'bg-zinc-900/40 border-zinc-800'\n      }`}>\n        {/* \u5361\u7247\u6a19\u984c\uff1a\u9805\u76ee\u540d\u7a31 */}\n        <div className=\"flex items-start justify-between gap-2 mb-3\">\n          <div className=\"flex-1 min-w-0\">\n            {row.isCustom ? (\n              <input\n                type=\"text\" value={row.name}\n                onChange={e => update(i, 'name', e.target.value)}\n                placeholder=\"\u9805\u76ee\u540d\u7a31\"\n                className=\"w-full bg-transparent text-zinc-100 text-base font-medium border-b border-zinc-700 focus:border-blue-500 focus:outline-none pb-1\"\n              />\n            ) : (\n              <div className=\"text-zinc-100 text-base font-medium leading-tight break-words\">{row.name}</div>\n            )}\n            <div className=\"flex items-center gap-2 mt-1.5 flex-wrap\">\n              <span className=\"text-[10px] px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400\">{row.category}</span>\n              <span className=\"text-[10px] text-zinc-500\">{isAsset ? row.holder : row.counterparty}</span>\n              {!row.isCustom && <span className=\"text-[10px] text-zinc-600\">\u7bc4\u672c</span>}\n            </div>\n          </div>\n          {row.isCustom && (\n            <button onClick={() => setRows(rows.filter((_, idx) => idx !== i))}\n              className=\"text-zinc-600 hover:text-rose-400 p-1 flex-shrink-0\">\n              <X className=\"w-4 h-4\" />\n            </button>\n          )}\n          {!row.isCustom && (\n            <button onClick={() => setRows(rows.filter((_, idx) => idx !== i))}\n              className=\"text-zinc-700 hover:text-rose-400 p-1 flex-shrink-0\"\n              title=\"\u5f9e\u672c\u6b21\u7d00\u9304\u79fb\u9664\uff08\u4e0b\u6b21\u65b0\u589e\u6642\u9084\u6703\u51fa\u73fe\uff09\">\n              <X className=\"w-4 h-4\" />\n            </button>\n          )}\n        </div>\n\n        {/* \u91d1\u984d\u8f38\u5165\u5340 \u2014 \u5927\u5b57\u660e\u986f */}\n        <div className=\"flex items-stretch gap-2\">\n          <select\n            value={row.currency}\n            onChange={e => update(i, 'currency', e.target.value)}\n            className=\"px-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 w-20\">\n            {CURRENCIES.map(c => <option key={c}>{c}</option>)}\n          </select>\n          <input\n            type=\"number\"\n            inputMode=\"decimal\"\n            value={row.amount || ''}\n            onChange={e => update(i, 'amount', parseFloat(e.target.value) || 0)}\n            placeholder=\"0\"\n            className=\"flex-1 px-3 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-100 text-right tabular-nums text-lg focus:border-blue-500 focus:outline-none\"\n          />\n        </div>\n\n        {/* \u81ea\u8a02\u5361\u7247\u624d\u986f\u793a\u5206\u985e/\u6301\u6709\u4eba\u9078\u55ae\uff1b\u7bc4\u672c\u4e0d\u80fd\u6539 */}\n        {row.isCustom && (\n          <div className=\"grid grid-cols-2 gap-2 mt-2\">\n            <select\n              value={row.category}\n              onChange={e => update(i, 'category', e.target.value)}\n              className=\"px-2 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-xs text-zinc-300\">\n              {cats.map(c => <option key={c}>{c}</option>)}\n            </select>\n            {isAsset ? (\n              <select\n                value={row.holder}\n                onChange={e => update(i, 'holder', e.target.value)}\n                className=\"px-2 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-xs text-zinc-300\">\n                {holdersList.map(h => <option key={h}>{h}</option>)}\n              </select>\n            ) : (\n              <input\n                type=\"text\"\n                value={row.counterparty}\n                onChange={e => update(i, 'counterparty', e.target.value)}\n                placeholder={ownerLabel}\n                className=\"px-2 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-xs text-zinc-300\"\n              />\n            )}\n          </div>\n        )}\n\n        {/* \u6d41\u52d5\u6027\uff08\u8cc7\u7522\uff09\u6216\u7dca\u6025\u7a0b\u5ea6\uff08\u8ca0\u50b5\uff09\u2014 \u6240\u6709\u5361\u7247\u90fd\u53ef\u8abf */}\n        {isAsset ? (\n          <div className=\"mt-2\">\n            <label className=\"text-[10px] text-zinc-600 block mb-1\">\ud83d\udca7 \u6d41\u52d5\u6027\uff08\u591a\u4e45\u80fd\u8b8a\u73fe\uff09</label>\n            <select\n              value={row.liquidity || 'instant'}\n              onChange={e => update(i, 'liquidity', e.target.value)}\n              className=\"w-full px-2 py-1.5 bg-zinc-800/60 border border-zinc-800 rounded text-zinc-300 text-xs\">\n              {LIQUIDITY_LEVELS.map(l => (\n                <option key={l.key} value={l.key}>{l.label}\uff08{l.desc}\uff09</option>\n              ))}\n            </select>\n          </div>\n        ) : (\n          <div className=\"mt-2\">\n            <label className=\"text-[10px] text-zinc-600 block mb-1\">\u23f0 \u9084\u6b3e\u7dca\u6025\u7a0b\u5ea6</label>\n            <select\n              value={row.urgency || 'low'}\n              onChange={e => update(i, 'urgency', e.target.value)}\n              className=\"w-full px-2 py-1.5 bg-zinc-800/60 border border-zinc-800 rounded text-zinc-300 text-xs\">\n              <option value=\"high\">\ud83d\udd34 \u96a8\u6642\u53ef\u80fd\u88ab\u8981\u6c42\u9084</option>\n              <option value=\"medium\">\ud83d\udfe1 \u56fa\u5b9a\u9084\u6b3e\u4e2d</option>\n              <option value=\"low\">\ud83d\udfe2 \u66ab\u6642\u4e0d\u7528\u9084 / \u53ea\u9084\u606f</option>\n            </select>\n          </div>\n        )}\n\n        {/* \u5099\u8a3b \u2014 \u53ef\u624b\u52d5\u7de8\u8f2f */}\n        <div className=\"mt-2\">\n          <label className=\"text-[10px] text-zinc-600 block mb-1\">\ud83d\udcdd \u5099\u8a3b\uff08\u53ef\u7de8\u8f2f\uff09</label>\n          <textarea\n            value={row.note || ''}\n            onChange={e => update(i, 'note', e.target.value)}\n            placeholder=\"\u4f8b\uff1a\u6708\u9084\u5229\u606f X \u842c\u3001\u5e74\u5229\u7387 X%\u3001\u5230\u671f\u65e5...\"\n            rows={row.note && row.note.length > 30 ? 2 : 1}\n            className=\"w-full px-2 py-1.5 bg-zinc-800/60 border border-zinc-800 hover:border-zinc-700 focus:border-blue-500 focus:bg-zinc-800 rounded text-zinc-300 text-[11px] leading-relaxed resize-none focus:outline-none transition\"\n          />\n        </div>\n      </div>\n    );\n  };\n\n  const currentRows = section === 'asset' ? assetRows : liabRows;\n  const setCurrentRows = section === 'asset' ? setAssetRows : setLiabRows;\n  const filledCount = currentRows.filter(r => parseFloat(r.amount) > 0).length;\n\n  return (\n    <div className=\"fixed inset-0 bg-black/90 z-50 flex flex-col\">\n      {/* Header */}\n      <div className=\"bg-zinc-950 border-b border-zinc-800 px-4 py-3 flex items-center justify-between sticky top-0\">\n        <button onClick={onClose} className=\"text-zinc-400 hover:text-zinc-200 p-1\">\n          <X className=\"w-6 h-6\" />\n        </button>\n        <h3 className=\"font-bold text-zinc-100 text-base flex items-center gap-2\">\n          <Sparkles className=\"w-4 h-4 text-blue-400\" />\n          \u65b0\u589e{scope === 'company' ? '\u516c\u53f8' : '\u500b\u4eba'}\u7d00\u9304\n        </h3>\n        <button\n          onClick={() => {\n            const validAssets = assetRows.filter(r => r.name && r.name.trim() && parseFloat(r.amount) > 0);\n            const validLiab = liabRows.filter(r => r.name && r.name.trim() && parseFloat(r.amount) > 0);\n\n            if (!date) {\n              setWarning('\u8acb\u9078\u64c7\u65e5\u671f');\n              return;\n            }\n            if (validAssets.length === 0 && validLiab.length === 0) {\n              setWarning('\u8acb\u81f3\u5c11\u586b\u4e00\u7b46\u91d1\u984d\uff08\u91d1\u984d\u8981\u5927\u65bc 0\uff09');\n              return;\n            }\n\n            const existingOnDate = [...existingAssets, ...existingLiab].some(x => x.date === date);\n            if (existingOnDate && !confirmOverwrite) {\n              setWarning(`OVERWRITE:${date}`);\n              return;\n            }\n\n            setWarning('');\n            onSave(date, validAssets, validLiab);\n          }}\n          className=\"px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium inline-flex items-center gap-1\">\n          <Check className=\"w-4 h-4\" />\u5132\u5b58\n        </button>\n      </div>\n\n      {/* \u63d0\u793a banner \u2014 \u53d6\u4ee3 alert/confirm */}\n      {warning && (\n        <div className=\"bg-amber-500/15 border-b border-amber-500/40 px-4 py-3\">\n          {warning.startsWith('OVERWRITE:') ? (\n            <div className=\"flex items-center justify-between gap-2 flex-wrap\">\n              <div className=\"text-amber-200 text-sm\">\n                \u26a0\ufe0f {warning.split(':')[1]} \u5df2\u6709\u7d00\u9304\uff0c\u5132\u5b58\u6703\u8986\u84cb\u820a\u8cc7\u6599\n              </div>\n              <div className=\"flex gap-2\">\n                <button\n                  onClick={() => { setWarning(''); }}\n                  className=\"px-3 py-1 text-sm text-zinc-300 bg-zinc-800 hover:bg-zinc-700 rounded\">\n                  \u53d6\u6d88\n                </button>\n                <button\n                  onClick={() => {\n                    setConfirmOverwrite(true);\n                    setWarning('');\n                    const validAssets = assetRows.filter(r => r.name && r.name.trim() && parseFloat(r.amount) > 0);\n                    const validLiab = liabRows.filter(r => r.name && r.name.trim() && parseFloat(r.amount) > 0);\n                    onSave(date, validAssets, validLiab);\n                  }}\n                  className=\"px-3 py-1 text-sm text-white bg-amber-600 hover:bg-amber-500 rounded font-medium\">\n                  \u78ba\u8a8d\u8986\u84cb\n                </button>\n              </div>\n            </div>\n          ) : (\n            <div className=\"flex items-center justify-between gap-2\">\n              <div className=\"text-amber-200 text-sm\">\u26a0\ufe0f {warning}</div>\n              <button onClick={() => setWarning('')} className=\"text-amber-300 hover:text-amber-100\">\n                <X className=\"w-4 h-4\" />\n              </button>\n            </div>\n          )}\n        </div>\n      )}\n\n      {/* \u65e5\u671f + \u5207\u63db */}\n      <div className=\"bg-zinc-950 border-b border-zinc-800 px-4 py-3 space-y-3\">\n        <div>\n          <label className=\"text-xs text-zinc-500 block mb-1\">\ud83d\udcc5 \u65e5\u671f</label>\n          <input\n            type=\"date\"\n            value={date}\n            onChange={e => setDate(e.target.value)}\n            className=\"w-full px-3 py-2.5 bg-zinc-900 border border-zinc-700 rounded-lg text-zinc-100\"\n          />\n          {lastDate && <p className=\"text-[11px] text-zinc-500 mt-1\">\u91d1\u984d\u5df2\u9810\u586b {lastDate} \u7684\u6578\u5b57</p>}\n        </div>\n\n        {/* \u8cc7\u7522/\u8ca0\u50b5\u5207\u63db */}\n        <div className=\"grid grid-cols-2 gap-2\">\n          <button\n            onClick={() => setSection('asset')}\n            className={`py-2.5 rounded-lg text-sm font-medium transition ${\n              section === 'asset'\n                ? 'bg-emerald-600/30 border border-emerald-500 text-emerald-300'\n                : 'bg-zinc-900 border border-zinc-800 text-zinc-500'\n            }`}>\n            \ud83d\udcb0 \u8cc7\u7522 <span className=\"text-xs ml-1\">({assetRows.filter(r => parseFloat(r.amount) > 0).length}/{assetRows.length})</span>\n          </button>\n          <button\n            onClick={() => setSection('liab')}\n            className={`py-2.5 rounded-lg text-sm font-medium transition ${\n              section === 'liab'\n                ? 'bg-rose-600/30 border border-rose-500 text-rose-300'\n                : 'bg-zinc-900 border border-zinc-800 text-zinc-500'\n            }`}>\n            \ud83d\udcc9 \u8ca0\u50b5 <span className=\"text-xs ml-1\">({liabRows.filter(r => parseFloat(r.amount) > 0).length}/{liabRows.length})</span>\n          </button>\n        </div>\n      </div>\n\n      {/* \u5361\u7247\u5340 \u2014 \u53ef\u6efe */}\n      <div className=\"flex-1 overflow-y-auto px-4 py-4 pb-24\">\n        <div className=\"space-y-3\">\n          {currentRows.map((row, i) => renderCard(row, i, section === 'asset'))}\n\n          {/* \u52a0\u65b0\u9805\u76ee\u5361\u7247 */}\n          <button\n            onClick={() => setCurrentRows([...currentRows, makeBlank(section === 'asset')])}\n            className=\"w-full py-4 rounded-2xl border-2 border-dashed border-zinc-700 text-zinc-500 hover:border-blue-500 hover:text-blue-400 transition inline-flex items-center justify-center gap-2\">\n            <Plus className=\"w-5 h-5\" />\n            \u65b0\u589e{section === 'asset' ? '\u8cc7\u7522' : '\u8ca0\u50b5'}\u9805\u76ee\n          </button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\nfunction PasswordGate() {\n  const [unlocked, setUnlocked] = useState(false);\n  const [input, setInput] = useState('');\n  const [error, setError] = useState(false);\n  const [checking, setChecking] = useState(true);\n  useEffect(() => {\n    try { if (localStorage.getItem('unlocked') === 'yes') setUnlocked(true); } catch (e) {}\n    setChecking(false);\n  }, []);\n  const tryUnlock = (remember) => {\n    if (input === '5588') {\n      setUnlocked(true); setError(false);\n      if (remember) { try { localStorage.setItem('unlocked', 'yes'); } catch (e) {} }\n    } else { setError(true); setInput(''); }\n  };\n  if (checking) return null;\n  if (unlocked) return <AssetDashboard />;\n  return (\n    <div className=\"min-h-screen bg-zinc-950 flex flex-col items-center justify-center px-6\">\n      <div className=\"w-20 h-20 rounded-3xl bg-white flex items-center justify-center mb-6 relative shadow-lg\">\n        <span className=\"absolute bottom-2 right-3 text-3xl font-extrabold\" style={{color:'#d4af37'}}>$</span>\n      </div>\n      <h1 className=\"text-zinc-100 text-xl font-bold mb-1\">\u8cc7\u7522\u5100\u8868\u677f</h1>\n      <p className=\"text-zinc-500 text-sm mb-6\">\u8acb\u8f38\u5165\u5bc6\u78bc</p>\n      <input type=\"password\" inputMode=\"numeric\" autoFocus value={input}\n        onChange={e => { setInput(e.target.value); setError(false); }}\n        onKeyDown={e => { if (e.key === 'Enter') tryUnlock(false); }}\n        placeholder=\"\u2022\u2022\u2022\u2022\"\n        className={\"w-full max-w-xs px-4 py-3 bg-zinc-900 border rounded-xl text-center text-2xl tracking-widest text-zinc-100 focus:outline-none \" + (error ? \"border-rose-500\" : \"border-zinc-700\")} />\n      {error && <p className=\"text-rose-400 text-sm mt-2\">\u5bc6\u78bc\u932f\u8aa4</p>}\n      <div className=\"w-full max-w-xs mt-4 space-y-2\">\n        <button onClick={() => tryUnlock(false)} className=\"w-full px-4 py-3 bg-blue-600 text-white rounded-xl font-medium\">\u89e3\u9396</button>\n        <button onClick={() => tryUnlock(true)} className=\"w-full px-4 py-2.5 bg-zinc-800 text-zinc-300 rounded-xl text-sm\">\u89e3\u9396\u4e26\u8a18\u4f4f\u9019\u652f\u624b\u6a5f</button>\n      </div>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<PasswordGate />);\n";
</script>
